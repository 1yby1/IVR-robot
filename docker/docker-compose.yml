services:
  mysql:
    image: mysql:8.0
    container_name: ivr-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ivr
      MYSQL_USER: ivr
      MYSQL_PASSWORD: ivr123
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../docs/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../docs/sql/init-data.sql:/docker-entrypoint-initdb.d/02-init-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ivr-net]

  redis:
    image: redis:7-alpine
    container_name: ivr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ivr-net]

  freeswitch:
    image: safarov/freeswitch:latest
    container_name: ivr-freeswitch
    restart: unless-stopped

    # SIP 信令 + RTP 媒体 + ESL
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "8021:8021/tcp"
      # RTP 媒体端口段（默认 16384-32768 范围，开发机建议缩小）
      - "16384-16484:16384-16484/udp"
    volumes:
      - ./freeswitch/entrypoint.sh:/ivr-entrypoint.sh:ro
      - ./freeswitch/conf/autoload_configs/event_socket.conf.xml:/etc/freeswitch/autoload_configs/event_socket.conf.xml:ro
      - ./freeswitch/conf/dialplan/default.xml:/etc/freeswitch/dialplan/default.xml:ro
      - freeswitch-log:/var/log/freeswitch
    environment:
      TZ: Asia/Shanghai
    networks: [ivr-net]
    depends_on:
      - redis

  ivr-admin:
    build:
      context: ../ivr-server
      dockerfile: ../docker/admin.Dockerfile
    container_name: ivr-admin
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ivr
      MYSQL_PASSWORD: ivr123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FS_HOST: freeswitch
      FS_PORT: 8021
      FS_PASSWORD: ClueCon
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-sk-placeholder}
      LLM_MODEL: ${LLM_MODEL:-qwen-plus}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-at-least-32-chars-long}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [ivr-net]
    profiles: ["full"]

  ivr-web:
    build:
      context: ../ivr-web
      dockerfile: ../docker/web.Dockerfile
    container_name: ivr-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - ivr-admin
    networks: [ivr-net]
    profiles: ["full"]

volumes:
  mysql-data:
  redis-data:
  freeswitch-log:

networks:
  ivr-net:
    driver: bridge
